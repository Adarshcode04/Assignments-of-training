<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Layout</title>
    <link rel="stylesheet" href="profile.css" />
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body>
    <div class="cards">
      <div class="image">
        <img
          src="https://png.pngtree.com/thumb_back/fh260/background/20240913/pngtree-stunning-red-and-blue-smoke-images-for-download-image_16191211.jpg"
        />
        <button>+</button>
      </div>

      <div class="profile">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSnSSxXHLqu5lsHYkFlZkvXuo2ZamNvdqLiCg&s"
          alt="profile"
        />
      </div>
      <div class="Name">
        <p>Adarsh Shrivatav</p>
        <p>Product designer who focuses on simplicity & usuability</p>
      </div>

      <div class="box2">
        <div>
          <h2>72.K</h2>
          <p>Likes</p>
        </div>
        <div>
          <h2>100k</h2>
          <p>Posts</p>
        </div>
        <div>
          <h2>412K</h2>
          <p>Views</p>
        </div>
      </div>
       <div class="Social-Media">
      <i class="fa-brands fa-linkedin"></i>
      <i class="fa-brands fa-github"></i>
        <i class="fa-brands fa-x-twitter"></i>
        </div>
    </div
  </body>
</html>
